<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GLAZE | Anonymous</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
<style>
        :root {
            --primary: #FF0080;
            --secondary: #7928CA;
            --bg: #050505;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Inter', sans-serif; 
            -webkit-font-smoothing: antialiased;
        }

        html, body {
            height: 100vh;
            width: 100vw;
            margin: 0;
            padding: 0;
            overflow: hidden; /* This kills all scrolling */
            position: fixed; /* Extra layer of protection for iOS safari */
        }

        body {
            background-color: var(--bg);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            padding: 20px;
            position: fixed;
            box-sizing: border-box;
        }

        /* --- Animated Background Blobs --- */
        body::before, body::after {
            content: '';
            position: absolute;
            width: 350px;
            height: 350px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            filter: blur(90px);
            border-radius: 50%;
            z-index: -1;
            opacity: 0.35;
            animation: float 15s infinite alternate ease-in-out;
        }

        body::before { top: -10%; left: -5%; }
        body::after { bottom: -10%; right: -5%; animation-delay: -7s; }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(60px, 40px) scale(1.1); }
        }

        /* --- Main Card --- */
        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(35px);
            -webkit-backdrop-filter: blur(35px);
            border: 1px solid var(--border);
            padding: 45px 30px;
            border-radius: 40px;
            width: 100%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 30px 100px rgba(0,0,0,0.8), inset 0 0 20px rgba(255,255,255,0.02);
            animation: cardEntrance 0.9s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            z-index: 10;
        }

        @keyframes cardEntrance {
            0% { opacity: 0; transform: scale(0.9) translateY(50px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        .username { 
            font-weight: 900; 
            font-size: 1.9rem; 
            letter-spacing: -1.8px; 
            margin-bottom: 10px;
            background: linear-gradient(to bottom, #fff, #aaa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .prompt { 
            color: rgba(255,255,255,0.4); 
            font-size: 0.95rem; 
            margin-bottom: 30px; 
            letter-spacing: 0.8px;
            text-transform: uppercase;
        }

        /* --- Textarea Style --- */
        textarea {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1.5px solid var(--border);
            border-radius: 25px;
            padding: 24px;
            color: white;
            font-size: 1.15rem;
            margin-bottom: 25px;
            outline: none;
            resize: none;
            transition: all 0.4s ease;
            font-weight: 600;
            box-shadow: inset 0 2px 15px rgba(0,0,0,0.4);
        }

        textarea:focus { 
            border-color: var(--primary); 
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 0 30px rgba(255, 0, 128, 0.1);
        }

        /* --- Glazed Button --- */
        .btn {
            background: #fff;
            color: #000;
            border: none;
            padding: 22px;
            border-radius: 100px;
            font-weight: 900;
            font-size: 1.1rem;
            cursor: pointer;
            width: 100%;
            position: relative;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 40px rgba(255, 0, 128, 0.2);
        }

        .btn::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -100%;
            width: 100%;
            height: 200%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6), transparent);
            transform: rotate(35deg);
            animation: shimmer 4s infinite;
        }

        @keyframes shimmer {
            0% { left: -100%; }
            20% { left: 100%; }
            100% { left: 100%; }
        }

        .btn:hover:not(:disabled) { 
            transform: translateY(-4px) scale(1.02); 
            box-shadow: 0 20px 50px rgba(255, 0, 128, 0.3);
        }

        .btn:active { transform: translateY(1px) scale(0.97); }

        .btn:disabled { 
            background: #1a1a1a; 
            color: #444; 
            cursor: not-allowed;
            box-shadow: none;
        }

        /* --- Success State --- */
        .success-ui { display: none; }
        .success-icon { 
            font-size: 80px; 
            margin-bottom: 25px; 
            display: inline-block;
            animation: checkBounce 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        }

        @keyframes checkBounce {
            0% { transform: scale(0) rotate(-45deg); opacity: 0; }
            100% { transform: scale(1) rotate(0); opacity: 1; }
        }

        /* --- Mobile Responsiveness --- */
        @media (max-width: 480px) {
            .glass-card { padding: 35px 20px; border-radius: 35px; width: 95%; }
            .username { font-size: 1.6rem; }
            textarea { padding: 20px; font-size: 1rem; }
            .btn { padding: 18px; font-size: 1rem; }
        }
    </style>
</head>
<body>

    <div class="glass-card" id="form-container">
        <h2 class="username">@glaze.me</h2>
        <p class="prompt">ask me anything anonymously</p>
        <textarea id="user_message" rows="4" placeholder="type a message..."></textarea>
        <button class="btn" onclick="sendGlaze()">Send Anonymously</button>
    </div>

    <div class="glass-card success-ui" id="success-container">
        <span class="success-icon">✅</span>
        <h2 class="username" style="color: #FF0080;">Message Sent!</h2>
        <p class="prompt" style="margin-bottom: 40px;">It's in their inbox now.</p>
        <button class="btn" onclick="location.reload()">Send Another</button>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
    import { getDatabase, ref, push, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyD0-Oxj0qYQsvMbcMi1XxUHa54yFFwrLiI",
        authDomain: "academic-hub-f2243.firebaseapp.com",
        databaseURL: "https://academic-hub-f2243-default-rtdb.firebaseio.com",
        projectId: "academic-hub-f2243",
        storageBucket: "academic-hub-f2243.firebasestorage.app",
        messagingSenderId: "926857473735",
        appId: "1:926857473735:web:978b82c50cd9d2087398e2",
        measurementId: "G-5CRM35B451"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // CRITICAL: We attach the function to 'window' so your HTML button can find it.
    // In a 'module', functions are private unless you do this.
    window.sendGlaze = function() {
        const msgInput = document.getElementById("user_message");
        const msg = msgInput.value.trim();
        const btn = document.querySelector(".btn");

        if(!msg) {
            msgInput.style.borderColor = "#FF0080";
            return;
        }

        btn.innerText = "Glazing...";
        btn.disabled = true;

        push(ref(db, 'messages'), {
            text: msg,
            timestamp: serverTimestamp()
        }).then(() => {
            document.getElementById("form-container").style.display = "none";
            document.getElementById("success-container").style.display = "block";
        }).catch((err) => {
            alert("Firebase Error: " + err.message);
            btn.disabled = false;
            btn.innerText = "Send Anonymously";
        });
    }
</script>
</body>
</html>
